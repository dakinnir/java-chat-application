spring:
  application:
    name: backend-server

  datasource:
    # PostgreSQL datasource configuration
    url: jdbc:postgresql://localhost:5432/backend_server_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect


jwt:
  # Secret and expiration can be overridden via environment variables
  secret: "${APP_SECURITY_JWT_SECRET:Sa1kh8BdNarm4kharUkI4e3o5AmjEAMrz6I2WdumD9Q=}"
  # access tokens in milliseconds (15 minutes)
  access-token-expiration-ms: 900000
  refresh-token-expiration-days: 7
